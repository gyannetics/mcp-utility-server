services:
  mcp-server:
    build: .
    image: mcp-utility-server:latest
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      # Optional: OPENAI_API_KEY, GROQ_API_KEY (from .env or host env)
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
